<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLW Canada Programs</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0b0b0d;
color:#ffffff;
font-family:"Josefin Sans",sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.wrap{
max-width:820px;
width:100%;
text-align:center;
}

h1{
font-family:"Cinzel",serif;
font-size:clamp(36px,6vw,60px);
margin-bottom:10px;
letter-spacing:2px;
}

.sub{
opacity:.7;
margin-bottom:50px;
font-size:18px;
}

.grid{
display:grid;
gap:30px;
}

@media(min-width:650px){
.grid{
grid-template-columns:1fr 1fr;
}
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:32px 26px;
}

.card h2{
font-family:"Cinzel",serif;
font-size:28px;
margin-bottom:12px;
}

.meta{
opacity:.75;
margin-bottom:22px;
}

.btn{
display:inline-block;
padding:12px 22px;
background:#8b1c44;
color:#fff;
text-decoration:none;
border-radius:6px;
font-weight:600;
transition:.25s;
}

.btn:hover{
background:#b3255a;
}

.footer{
margin-top:50px;
font-size:14px;
opacity:.45;
}

</style>
</head>

<body>

<div class="wrap">

<h1>BLW Canada</h1>
<div class="sub">Upcoming Programs</div>

<div class="grid">

<!-- Delightfully His -->

<div class="card">

<h2>Delightfully His</h2>

<div class="meta">
Friday • March 6, 2026<br>
8:00 PM CST
</div>

<a href="delightfullyhis.html" class="btn">
Register
</a>

</div>


<!-- The God Class -->

<div class="card">

<h2>The God Class</h2>

<div class="meta">
Saturday • March 7, 2026<br>
10:00 PM CST
</div>

<a href="thegodclass.html" class="btn">
Register
</a>

</div>

</div>

<div class="footer">
BLW Canada
</div>

</div>

</body>
</html>
