<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLW Canada Programs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  background:#0d0a10;
  color:#ffffff;
  font-family:"Josefin Sans",sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,28,68,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(100,20,50,0.12) 0%, transparent 60%);
}

.wrap{ max-width:820px; width:100%; text-align:center; }

/* Logo */
.logo-wrap{
  display:flex; justify-content:center; align-items:center;
  margin-bottom:20px;
  animation: floatIn 0.9s ease both;
}
.logo-wrap img{
  height:100px;
  width:auto;
  object-fit:contain;
  filter: drop-shadow(0 0 22px rgba(180,40,90,0.55));
  transition: transform .3s ease, filter .3s ease;
}
.logo-wrap img:hover{
  transform: scale(1.05);
  filter: drop-shadow(0 0 32px rgba(200,50,100,0.75));
}

/* Heading */
h1{
  font-family:"Cinzel",serif;
  font-size:clamp(34px,6vw,58px);
  margin-bottom:8px;
  letter-spacing:3px;
  background: linear-gradient(135deg, #ffffff 40%, #e8a0b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: floatIn 0.9s ease 0.1s both;
}

.sub{
  opacity:.65;
  margin-bottom:48px;
  font-size:17px;
  letter-spacing:2px;
  text-transform:uppercase;
  animation: floatIn 0.9s ease 0.2s both;
}

/* Grid */
.grid{ display:grid; gap:24px; }
@media(min-width:650px){ .grid{ grid-template-columns:1fr 1fr; } }

/* Cards */
.card{
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius:20px;
  padding:34px 28px;
  position:relative;
  overflow:hidden;
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  animation: floatIn 0.9s ease both;
}
.card:nth-child(1){ animation-delay: 0.25s; }
.card:nth-child(2){ animation-delay: 0.35s; }
.card:nth-child(3){ animation-delay: 0.45s; }

.card::before{
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,28,68,0.12), transparent 70%);
  pointer-events:none;
}

.card:hover{
  transform: translateY(-5px);
  border-color: rgba(180,40,90,0.45);
  box-shadow: 0 16px 40px rgba(139,28,68,0.2), 0 0 0 1px rgba(180,40,90,0.15);
}

.card h2{
  font-family:"Cinzel",serif;
  font-size:26px;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* Little decorative dot divider */
.card-divider{
  width:30px; height:2px;
  background: linear-gradient(90deg, #8b1c44, #c4547a);
  border-radius:2px;
  margin: 0 auto 14px;
}

.meta{
  opacity:.7;
  margin-bottom:24px;
  font-size:14px;
  line-height:1.7;
  letter-spacing:.5px;
}

.btn{
  display:inline-block;
  padding:11px 26px;
  background: linear-gradient(135deg, #8b1c44, #b3255a);
  color:#fff;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  font-size:13px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  transition:.25s;
  box-shadow: 0 4px 16px rgba(139,28,68,0.35);
}
.btn:hover{
  background: linear-gradient(135deg, #a82254, #d43070);
  box-shadow: 0 6px 22px rgba(180,40,90,0.5);
  transform: translateY(-1px);
}

/* Footer */
.footer{
  margin-top:48px;
  font-size:13px;
  opacity:.35;
  letter-spacing:2px;
  text-transform:uppercase;
  animation: floatIn 0.9s ease 0.55s both;
}

/* Animations */
@keyframes floatIn {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <img
      src="https://raw.githubusercontent.com/Amber-E-Moseri/playing-money-game/main/canada_sr.png"
      alt="BLW Canada Logo"
      onerror="this.style.display='none'"
    />
  </div>
  <h1>BLW Canada</h1>
  <div class="sub">Upcoming Programs</div>
  <div class="grid">
    <div class="card">
      <h2>Delightfully His</h2>
      <div class="card-divider"></div>
      <div class="meta">Friday • March 6, 2026<br>8:00 PM CST</div>
      <a href="delightfullyhis.html" class="btn">Register</a>
    </div>
    <div class="card">
      <h2>The God Class</h2>
      <div class="card-divider"></div>
      <div class="meta">Saturday • March 7, 2026<br>8:00 PM CST</div>
      <a href="thegodclass.html" class="btn">Register</a>
    </div>
    <div class="card">
      <h2>Playing the Money Game</h2>
      <div class="card-divider"></div>
      <div class="meta">Wednesdays • Feb 18 – Mar 25, 2026<br>7:00 PM CST</div>
      <a href="playingthemoneygame.html" class="btn">View Hub</a>
    </div>
  </div>
  <div class="footer">BLW Canada</div>
</div>
</body>
</html>
